<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Ananya ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* Intro */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ff4d6d;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#intro h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
}

/* Button */
.start-btn {
    padding: 15px 25px;
    background: white;
    color: #ff4d6d;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    margin-top: 20px;
    cursor: pointer;
}

/* Main */
#main {
    display: none;
    padding: 30px;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 50px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 25px #fff, 0 0 40px pink; }
}

/* Box */
.box {
    background: rgba(255,255,255,0.2);
    padding: 20px;
    border-radius: 20px;
}

/* Image */
img {
    width: 220px;
    border-radius: 15px;
    margin-top: 15px;
}

/* Text */
#typing {
    font-family: 'Dancing Script', cursive;
    font-size: 22px;
    margin-top: 15px;
}

/* Hearts */
.heart {
    position: absolute;
    bottom: -10px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="intro">
    <h1>💌 Somethings Special For Birthday Girl 💌</h1>
    <button class="start-btn" onclick="start()">Tap to Open ❤️</button>
</div>

<div id="main">
    <h1>🎉 Happy Birthday Ananya 🎉</h1>

    <div class="box">
        <img src="C:\Users\ASUS\Desktop\birthday.html\aphoto.jpeg">
        <div id="typing"></div>
    </div>
</div>

<audio id="music" loop>
    <source src="C:\Users\ASUS\Desktop\birthday.html\song.mpeg">
</audio>

<!-- Fireworks -->
<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2/dist/index.umd.js"></script>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function start() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";

    document.getElementById("music").play();

    typeMessage();
    createHearts();
    startFireworks();
    launchConfetti();
}

/* Fireworks */
function startFireworks() {
    const fw = new Fireworks.default(document.body, {
        particles: 70,
        explosion: 6
    });
    fw.start();
}

/* Confetti */
function launchConfetti() {
    confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 }
    });
}

/* Message */
const text = `My Love Ananya ❤️

You are my happiness 💖  
You are my world 💘  

Every moment with you is magical 💞  
I am lucky to have you 💓  

You are my today… and all of my tomorrows 💗  

💝 Happy Birthday My Forever 💝`;

let i = 0;
function typeMessage() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeMessage, 35);
    }
}

/* Hearts */
function createHearts() {
    const emojis = ["❤️","💖","💘","💝","💞","💓","💗"];

    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 200);
}
</script>

</body>
</html>
